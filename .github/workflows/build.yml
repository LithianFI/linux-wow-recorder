name: Build Executables

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual runs from the Actions tab

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: WoWRaidRecorder-linux
            asset_name: WoWRaidRecorder-linux.tar.gz
          - os: windows-latest
            artifact_name: WoWRaidRecorder-windows
            asset_name: WoWRaidRecorder-windows.zip
          - os: macos-latest
            artifact_name: WoWRaidRecorder-macos
            asset_name: WoWRaidRecorder-macos.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: pyinstaller wow_raid_recorder.spec --clean

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller wow_raid_recorder.spec --clean

      # ── Package ──────────────────────────────────────────────────────────────

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czf ../${{ matrix.asset_name }} WoWRaidRecorder/

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          tar -czf ../${{ matrix.asset_name }} WoWRaidRecorder/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          Compress-Archive -Path WoWRaidRecorder\ -DestinationPath ..\${{ matrix.asset_name }}
        shell: powershell

      # ── Upload build artifact (always, so you can download from Actions tab) ─

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 14

  # ── Attach to GitHub Release (only on tag pushes) ──────────────────────────

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write   # Needed to create releases and upload assets

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/WoWRaidRecorder-linux/WoWRaidRecorder-linux.tar.gz
            artifacts/WoWRaidRecorder-windows/WoWRaidRecorder-windows.zip
            artifacts/WoWRaidRecorder-macos/WoWRaidRecorder-macos.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
